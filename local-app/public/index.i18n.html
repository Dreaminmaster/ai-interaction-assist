<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Interactive Learning System</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="outline-panel">
        <div class="brand">Learning OS</div>
        <input class="search" id="outlineSearch" placeholder="搜索主题或章节" />

        <div class="section-label" data-i18n="create_topic">新建学习主题</div>
        <form class="topic-form" id="topicForm">
          <input class="text-input" id="titleInput" data-i18n-placeholder="title_placeholder" placeholder="主题名称" />
          <textarea class="text-area" id="goalInput" data-i18n-placeholder="goal_placeholder" placeholder="学习目标"></textarea>
          <select class="select-input" id="modeInput">
            <option value="补基础模式" data-i18n="mode_basic">补基础模式</option>
            <option value="理解模式" selected data-i18n="mode_understand">理解模式</option>
            <option value="考试模式" data-i18n="mode_exam">考试模式</option>
            <option value="答辩模式" data-i18n="mode_defense">答辩模式</option>
            <option value="论文模式" data-i18n="mode_paper">论文模式</option>
            <option value="项目模式" data-i18n="mode_project">项目模式</option>
          </select>
          <button class="primary-btn" type="submit" data-i18n="create_topic_button">创建主题</button>
        </form>

        <div class="section-label" data-i18n="recent_topics">最近主题</div>
        <div class="outline-list" id="topicList"></div>

        <div class="section-label">Provider</div>
        <select class="select-input" id="providerSelect">
          <option value="local-openai-compatible">local-openai-compatible</option>
          <option value="openai-responses">openai-responses</option>
          <option value="oauth-backend">oauth-backend</option>
          <option value="mock">mock</option>
        </select>

        <details class="provider-settings" open>
          <summary data-i18n="provider_config_title">Provider 配置</summary>
          <input class="text-input" id="openaiBaseUrlInput" placeholder="OpenAI Base URL" />
          <input class="text-input" id="openaiModelInput" placeholder="OpenAI Model" />
          <input class="text-input" id="openaiApiKeyInput" placeholder="OPENAI_API_KEY" />
          <input class="text-input" id="localBaseUrlInput" placeholder="Local Model Base URL" />
          <input class="text-input" id="localModelInput" placeholder="Local Model Name" />
          <input class="text-input" id="localApiKeyInput" placeholder="Local Model API Key (optional)" />
          <input class="text-input" id="oauthUpstreamInput" placeholder="OAuth Backend Upstream URL" />
          <input class="text-input" id="oauthAccessTokenInput" placeholder="OAuth Access Token (optional)" />
          <button class="secondary-btn" id="saveProviderConfigBtn" type="button" data-i18n="save_provider_config">保存 Provider 配置</button>
          <button class="secondary-btn" id="testProviderBtn" type="button">测试当前 Provider 连接</button>
        </details>

        <div class="side-actions">
          <select class="select-input" id="languageSelect">
            <option value="zh-CN">中文</option>
            <option value="en">English</option>
          </select>
          <button class="secondary-btn" id="exportBtn" data-i18n="export_backup">导出学习备份</button>
          <label class="secondary-btn upload-btn" for="importFileInput">
            <span data-i18n="import_backup">导入学习备份</span>
          </label>
          <input id="importFileInput" type="file" accept="application/json" style="display:none;" />
        </div>
      </aside>

      <main class="doc-panel">
        <div class="doc-head">
          <div class="breadcrumb" id="breadcrumbText">Learning / Topic / Section</div>
          <h1 id="topicTitle">AI 交互式学习系统</h1>
          <p id="topicGoal">本地一键打开的长期学习网页应用。</p>
          <div class="status-inline" id="statusText">等待开始学习</div>
        </div>

        <section class="doc-section">
          <div class="doc-section-title" data-i18n="reading_flow">段落学习流</div>
          <div id="lessonFlow" class="lesson-flow"></div>
        </section>

        <section class="doc-section qa-block">
          <div class="doc-section-title" data-i18n="current_questions">本轮问题</div>
          <ol class="question-list" id="questionList"></ol>
          <button class="secondary-btn" id="startSessionBtn" data-i18n="start_session">开始本轮学习</button>
          <form class="answer-form" id="answerForm">
            <textarea class="answer-input" id="answerInput" data-i18n-placeholder="answer_placeholder" placeholder="在这里写下你的理解、例子或当前困惑。"></textarea>
            <button class="primary-btn" id="submitAnswerBtn" type="submit" data-i18n="submit_answer">提交回答并更新本轮沉淀</button>
          </form>
        </section>

        <section class="doc-section profile-block">
          <div class="doc-section-title" data-i18n="topic_profile">主题档案</div>
          <div class="meta-grid">
            <div><span data-i18n="current_mode">当前模式</span><strong id="topicMode">-</strong></div>
            <div><span data-i18n="current_stage">当前阶段</span><strong id="topicStage">-</strong></div>
            <div><span data-i18n="current_status">当前状态</span><strong id="topicStatus">-</strong></div>
            <div><span data-i18n="next_entry">下次入口</span><strong id="topicNext">-</strong></div>
          </div>
          <ul id="weakPointList"></ul>
          <div class="hidden-support">
            <div id="sessionTopicTitle"></div>
            <div id="sessionTopicGoal"></div>
            <div id="sessionTopicNext"></div>
            <div id="sessionSummary"></div>
            <div id="sessionNext"></div>
            <ul id="masteredList"></ul>
            <ul id="sessionWeakList"></ul>
            <div id="recentSessionList"></div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/app.i18n.js"></script>
  </body>
</html>
